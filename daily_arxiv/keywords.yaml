# Topical pre-filter for the daily pipeline (MCSP × AI4Sci).
#
# Strategy: a paper is KEPT if its title or abstract contains any of
# the substrings below (case-insensitive). The list is deliberately
# narrow — every term should be a strong signal that the paper is
# about molecular/crystal structures or materials chemistry, not just
# a generic ML paper that happens to mention "GNN" or "diffusion".

keywords:
  # --- Core MCSP terms ---
  - crystal structure prediction
  - molecular crystal
  - polymorph
  - co-crystal
  - cocrystal
  - lattice energy
  - structure search                # catches "Generative structure search ..."
  - generative structure
  - molecular packing
  - crystal packing
  - powder diffraction
  - space group
  - solid form
  - solid-state form
  - amorphous solid
  - crystal engineering
  - hydrogen bond network

  # --- Adjacent crystalline-materials topics ---
  - metal-organic framework
  - covalent organic framework
  - inorganic crystal
  - perovskite structure
  - protein crystal
  - zeolite

  # --- ML methods *applied to* chemistry/materials specifically ---
  - machine learning potential
  - neural network potential
  - molecular dynamics simulation
  - density functional theory
  - DFT calculation
  - inverse design
  - materials discovery
  - molecular generation
  - molecular discovery
  - generative chemistry
  - crystal generation
  - molecule generation
