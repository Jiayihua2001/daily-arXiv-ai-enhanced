# MCSP × AI4Sci pre-filter keywords (rewritten 2026-05).
#
# A paper is KEPT for downstream LLM screening if its title or abstract
# substring-matches ANY of these (case-insensitive). The list intentionally
# overshoots — the cheap LLM screen step (ai/screen.py) does the actual
# relevance ranking, this is just the pre-filter that keeps daily LLM cost
# bounded by gating out papers that have zero MCSP × AI4Sci signal.
#
# Tiers below are documentation only — they're not enforced.

keywords:
  # ============= Tier 1: direct MCSP / CSP =================================
  - crystal structure prediction
  - molecular crystal
  - molecular crystals
  - crystal polymorph
  - polymorph prediction
  - polymorph selection
  - polymorph stability
  - polymorphic transition
  - conformational polymorph
  - co-crystal screening
  - cocrystal screening
  - molecular co-crystal
  - molecular cocrystal
  - pharmaceutical co-crystal
