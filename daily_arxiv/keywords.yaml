# Topical pre-filter for the daily pipeline (MCSP × AI4Sci).
#
# A paper is KEPT if its title or abstract contains ANY of the substrings
# below (case-insensitive). The list aims for breadth without dragging in
# unrelated cs.LG noise — every term should be a strong signal that the
# paper is about molecular/crystal structures, materials chemistry, or
# ML-for-chemistry/materials specifically.
#
# Curated in 5 tiers — comments are documentation, not enforced groups.

keywords:
  # ============= Tier 1: core MCSP (very high precision) =====================
  - crystal structure prediction
  - molecular crystal
  - molecular crystals
  # 'polymorph' alone matches genetic-polymorphism papers (e.g. SNP studies)
  # so we disambiguate with crystallography-context substrings.
  - crystal polymorph
  - polymorph selection
  - polymorph stability
  - polymorph prediction
  - polymorphic transition
  - polymorphic phase
  - polymorphic crystal
  - conformational polymorph
  # bare 'co-crystal' has matched protein/peptide co-crystal complexes
  # that are not MCSP. Prefer disambiguated variants:
  - molecular co-crystal
  - molecular cocrystal
  - pharmaceutical co-crystal
  - pharmaceutical cocrystal
  - co-crystal formation
  - cocrystal formation
  - co-crystal screening
  - cocrystal screening
  - lattice energy
  - structure search
  - generative structure
  - molecular packing
  - crystal packing
  - crystal engineering
  - crystal growth
  - crystal nucleation
  - molecular solid
  # 'solid form' alone matches 'solid lipid' and similar. Narrow to MCSP
  # context.
  - solid form selection
  - solid form screening
  - polymorphic solid form
  - crystalline solid form
  - solid-state form selection
  - amorphous solid dispersion
  - amorphous solid form
  - powder diffraction
  - single crystal
  - single-crystal
  - space group
  - hydrogen bond network
  - pharmaceutical crystal
  - drug polymorph
  - API polymorph
  - pi-stacking
  - van der waals crystal

  # ============= Tier 2: adjacent crystalline / materials topics =============
  - metal-organic framework
  - metal organic framework
  - covalent organic framework
  - perovskite
  - zeolite
  - protein crystal
  - biomolecular crystal
  - inorganic crystal
  - layered material
  - 2D material
  - 2D crystal
  - phase diagram
  - phase transition

  # ============= Tier 3: ML methods *applied to* materials/chemistry =========
  - machine learning potential
  - neural network potential
  - interatomic potential
  - universal force field
  - universal interatomic potential
  - equivariant neural network
  - E(3)-equivariant
  - SE(3)-equivariant
  - message passing neural network
  - crystal graph
  - graph neural network for materials
  - graph neural network for molecules
  - graph neural network for crystal
  - inverse design
  - materials discovery
  - molecular generation
  - molecule generation
  - crystal generation
  - structure generation
  - generative chemistry
  - generative materials
  - de novo design

  # ============= Tier 4: specific framework / model names ===================
  # These are unambiguous — if a paper mentions them, it's in our field.
  - MACE
  - NequIP
  - Allegro
  - M3GNet
  - CHGNet
  - MatGL
  - SchNet
  - PaiNN
  - DimeNet
  - ALIGNN
  - GNoME
  - TorchMD
  - Open Catalyst
  - alphafold

  # ============= Tier 5: computational chemistry methods ====================
  - density functional theory
  - DFT calculation
  - ab initio
  - first-principles
  - molecular dynamics simulation
  - ab initio molecular dynamics
  - enhanced sampling
  - metadynamics
  - replica exchange
  - electronic structure calculation
  - thermodynamic stability
  - kinetic stability
  - free energy calculation

  # ============= Tier 6: broader AI4Science net (added 2026-05) ============
  # Goal: catch papers that are clearly ML-for-science but don't drop a tier-1
  # term in the abstract. Each term should still imply science/chemistry/
  # materials context, not generic ML.
  - molecular property prediction
  - molecular property
  - chemical property prediction
  - materials property prediction
  - materials informatics
  - materials genome
  - high-throughput screening
  - virtual screening
