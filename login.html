<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Daily arXiv</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/claude.css?v=20260504">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+Pro:wght@400;500;600&display=swap">
</head>
<body class="login">
    <div class="login-container">
        <a href="index.html" class="site-logo">
            <span class="site-title">Daily arXiv</span>
            <span class="site-title-suffix">MCSP × AI4Sci</span>
        </a>
        <h1>Sign in</h1>
        <div class="subtitle">Enter the access password to continue.</div>
        <form id="loginForm">
            <div class="input-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder=""
                    required
                    autofocus
                    autocomplete="current-password"
                >
            </div>
            <div class="remember-me">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">Remember me for 7 days</label>
            </div>
            <button type="submit">Continue</button>
            <div class="error-message" id="errorMessage">
                Invalid password. Try again.
            </div>
        </form>
        <div class="footer">
            daily-arXiv-ai-enhanced
        </div>
    </div>

    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const rememberMe = document.getElementById('rememberMe');
        const errorMessage = document.getElementById('errorMessage');

        if (Auth.isAuthenticated()) {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
            window.location.href = redirect;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            const remember = rememberMe.checked;

            if (await Auth.login(password, remember)) {
                const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                window.location.href = redirect;
            } else {
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
                setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
